<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>問題集 · 全知專案</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .problems-page { max-width: 820px; margin: 0 auto; padding: 0 24px 80px; }
    .page-header { padding: 48px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    .page-title { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    .page-desc { color: var(--text-muted); font-size: 15px; line-height: 1.7; }

    .problem-list { display: flex; flex-direction: column; gap: 12px; }

    .problem-item {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: var(--transition);
    }
    .problem-item:hover {
      border-color: var(--accent-dim);
      transform: translateX(4px);
      text-decoration: none;
    }

    .problem-num { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; }
    .problem-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .problem-tags-inline { display: flex; gap: 6px; flex-wrap: wrap; }
    .ptag { font-size: 11px; color: var(--text-dim); }
    .ptag::before { content: '#'; }
    .problem-arrow { color: var(--accent); opacity: 0; transition: var(--transition); }
    .problem-item:hover .problem-arrow { opacity: 1; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="../index.html" style="display:flex;align-items:center;gap:10px;color:inherit;text-decoration:none;">
          <span class="logo-icon">◈</span>
          <span class="logo-text">全知專案</span>
        </a>
      </div>
      <nav class="site-nav">
        <a href="../index.html" class="nav-link">地圖</a>
        <a href="index.html" class="nav-link active">問題集</a>
      </nav>
    </div>
  </header>

  <main class="problems-page">
    <div class="page-header">
      <h1 class="page-title">問題集</h1>
      <p class="page-desc">
        記錄遇到的具體問題與解題過程。<br />
        知識的意義在應用——這裡的每道題都是一次真實的知識調用。
      </p>
    </div>

    <div class="problem-list">
      <a href="001-半圓等分.html" class="problem-item">
        <div class="problem-num">#001</div>
        <div>
          <div class="problem-name">半圓等分問題</div>
          <div class="problem-tags-inline">
            <span class="ptag">微積分</span>
            <span class="ptag">定積分</span>
            <span class="ptag">Newton 法</span>
            <span class="ptag">數值方法</span>
          </div>
        </div>
        <span class="problem-arrow">→</span>
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <p>全知專案 · <a href="https://github.com/Risch315815/Know_All" target="_blank">GitHub</a></p>
  </footer>

</body>
</html>
