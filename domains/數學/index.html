<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>數學知識地圖 · 全知專案</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    /* ── Page layout ─────────────────────────────── */
    .math-page { max-width: 1000px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Section headers ──────────────────────────── */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 14px;
    }
    .section-block { margin-bottom: 56px; }
    .section-block h2 { font-size: 20px; font-weight: 600; margin-bottom: 18px; }

    /* ── Dependency Graph ─────────────────────────── */
    .graph-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 4px 12px;
      overflow-x: auto;
      margin-bottom: 10px;
    }
    #mathGraph { display: block; margin: 0 auto; }

    .graph-node rect {
      rx: 6; ry: 6;
      transition: filter 0.15s;
      cursor: pointer;
    }
    .graph-node:hover rect { filter: brightness(1.3); }
    .graph-node text { pointer-events: none; font-family: system-ui, sans-serif; }

    .graph-edge { fill: none; stroke-width: 1.5; }

    /* Legend */
    .graph-legend {
      display: flex; gap: 20px; flex-wrap: wrap;
      padding: 12px 16px;
      font-size: 12px; color: var(--text-muted);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* ── Branch cards ────────────────────────────── */
    .branch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .branch-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
    }
    .branch-card:hover { border-color: var(--accent-dim); }

    .branch-card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .branch-card-color {
      width: 4px; align-self: stretch; border-radius: 2px; flex-shrink: 0;
    }
    .branch-card-titles { flex: 1; min-width: 0; }
    .branch-card-name { font-size: 15px; font-weight: 600; }
    .branch-card-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .branch-card-chevron { color: var(--text-dim); font-size: 13px; transition: transform 0.2s; flex-shrink: 0; }
    .branch-card.open .branch-card-chevron { transform: rotate(90deg); }

    .branch-card-body {
      display: none;
      padding: 0 16px 16px 32px;
      border-top: 1px solid var(--border);
    }
    .branch-card.open .branch-card-body { display: block; }

    .branch-card-body h4 {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-dim);
      margin: 14px 0 6px;
    }
    .branch-card-body ul {
      list-style: none; padding: 0; margin: 0;
    }
    .branch-card-body ul li {
      font-size: 13px; color: var(--text-muted); padding: 3px 0;
      display: flex; align-items: baseline; gap: 6px;
    }
    .branch-card-body ul li::before {
      content: '—'; color: var(--text-dim); flex-shrink: 0; font-size: 11px;
    }
    .rel-arrow { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .rel-target { color: var(--accent); }

    /* ── Learning paths ───────────────────────────── */
    .paths-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .path-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .path-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .path-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
    .path-steps { list-style: none; padding: 0; margin: 0; }
    .path-steps li {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; font-size: 13px; color: var(--text-muted);
    }
    .path-steps li .step-num {
      width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }

    /* ── Spectrum table ───────────────────────────── */
    .spectrum-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .spectrum-table th {
      padding: 10px 14px; text-align: left; font-size: 11px;
      font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-dim); border-bottom: 1px solid var(--border);
    }
    .spectrum-table td {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }
    .spectrum-table tr:last-child td { border-bottom: none; }
    .spectrum-table td:first-child { color: var(--text); font-weight: 500; }
    .stars { letter-spacing: 0.1em; font-size: 12px; }
    .star-filled { color: #f59e0b; }
    .star-empty { color: var(--text-dim); }
    .prereq-tag {
      font-size: 11px; padding: 2px 8px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-muted);
      display: inline-block; margin: 1px 2px;
    }

    /* ── Todo list ────────────────────────────────── */
    .todo-list { list-style: none; padding: 0; }
    .todo-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; font-size: 14px; color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .todo-list li:last-child { border-bottom: none; }
    .todo-check {
      width: 16px; height: 16px; border: 1px solid var(--border);
      border-radius: 4px; flex-shrink: 0;
    }

    /* Category colors */
    .c-foundation { background: #4a5270; }
    .c-core       { background: #2d4a7a; }
    .c-pure       { background: #1e4a3f; }
    .c-applied    { background: #5a3a1e; }
    .c-cs         { background: #3a1e5a; }

    .c-foundation-text { color: #9aa3c8; }
    .c-core-text  { color: #7c9ef8; }
    .c-pure-text  { color: #34d399; }
    .c-applied-text { color: #f59e0b; }
    .c-cs-text    { color: #a78bfa; }
  </style>
</head>

// ── Render graph ─────────────────────────────────────────────────────

function renderGraph() {
  const svg = document.getElementById('mathGraph');
  const W = 820, H = 560;
  const NW = 110, NH = 36; // node width/height

  // Build node lookup
  const nodeMap = {};
  NODES.forEach(n => { nodeMap[n.id] = n; });

  let html = '';

  // Edges first (so nodes appear on top)
  EDGES.forEach(e => {
    const from = nodeMap[e.f], to = nodeMap[e.t];
    if (!from || !to) return;

    // Simple straight line from bottom-center of from to top-center of to
    const x1 = from.x, y1 = from.y + NH / 2;
    const x2 = to.x,   y2 = to.y  - NH / 2;

    // Bezier control points
    const midY = (y1 + y2) / 2;
    const d = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;

    const cat = CATS[from.cat];
    html += `<path d="${d}" class="graph-edge"
      stroke="${cat.stroke}" opacity="0.5"
      ${e.dash ? 'stroke-dasharray="5 3"' : ''}/>`;
  });

  // Arrowhead marker
  html = `<defs>
    ${Object.entries(CATS).map(([id, c]) =>
      `<marker id="arrow-${id}" markerWidth="6" markerHeight="6"
        refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="${c.stroke}" opacity="0.6"/>
      </marker>`
    ).join('')}
  </defs>` + html;

  // Nodes
  NODES.forEach(n => {
    const cat = CATS[n.cat];
    const x = n.x - NW / 2, y = n.y - NH / 2;
    html += `
      <g class="graph-node" data-id="${n.id}" onclick="highlightBranch('${n.id}')">
        <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="6" ry="6"
          fill="${cat.fill}" stroke="${cat.stroke}" stroke-width="1.5"/>
        <text x="${n.x}" y="${n.y - 5}" text-anchor="middle"
          font-size="11.5" font-weight="600" fill="${cat.text}">${n.name}</text>
        <text x="${n.x}" y="${n.y + 9}" text-anchor="middle"
          font-size="9" fill="${cat.stroke}">${n.sub}</text>
      </g>`;
  });

  svg.innerHTML = html;
}

// ── Render branch cards ───────────────────────────────────────────────

function stars(filled, total = 5) {
  let s = '';
  for (let i = 0; i < total; i++) {
    s += i < filled
      ? '<span class="star-filled">★</span>'
      : '<span class="star-empty">☆</span>';
  }
  return `<span class="stars">${s}</span>`;
}

function renderBranches() {
  const grid = document.getElementById('branchGrid');
  grid.innerHTML = BRANCHES.map(b => {
    const cat = CATS[b.cat];
    const concepts = b.concepts.map(c => `<li>${c}</li>`).join('');
    const rels = b.relations.map(r => `
      <li>
        <span class="rel-arrow">${r.dir}</span>
        <span>${r.link
          ? `<a href="${r.link}" class="rel-target">${r.target}</a>`
          : `<span class="rel-target">${r.target}</span>`}：${r.note}</span>
      </li>`).join('');
    return `
      <div class="branch-card" id="card-${b.id}">
        <div class="branch-card-header" onclick="toggleCard('${b.id}')">
          <div class="branch-card-color" style="background:${cat.stroke}"></div>
          <div class="branch-card-titles">
            <div class="branch-card-name">${b.name}</div>
            <div class="branch-card-sub">${b.sub}</div>
          </div>
          <span class="branch-card-chevron">›</span>
        </div>
        <div class="branch-card-body">
          <p style="font-size:13px;color:var(--text-muted);line-height:1.7;margin:14px 0 0;">${b.what}</p>
          <h4>核心概念</h4>
          <ul>${concepts}</ul>
          <h4>與其他分支的關係</h4>
          <ul>${rels}</ul>
        </div>
      </div>`;
  }).join('');
}

// ── Render paths ──────────────────────────────────────────────────────

function renderPaths() {
  const grid = document.getElementById('pathsGrid');
  grid.innerHTML = PATHS.map(p => {
    const steps = p.steps.map(s => `
      <li>
        <div class="step-num" style="background:${p.numBg};color:${p.numColor}">${s.n}</div>
        ${s.text}
      </li>`).join('');
    return `
      <div class="path-card" style="background:${p.color};border-color:${p.border}">
        <div class="path-label" style="color:${p.labelColor}">${p.label}</div>
        <div class="path-title">${p.title}</div>
        <ul class="path-steps">${steps}</ul>
      </div>`;
  }).join('');
}

// ── Render spectrum table ─────────────────────────────────────────────

function renderSpectrum() {
  const tbl = document.getElementById('spectrumTable');
  const rows = SPECTRUM.map(row => {
    const prereqs = row.prereq.length
      ? row.prereq.map(p => `<span class="prereq-tag">${p}</span>`).join('')
      : '<span style="color:var(--text-dim);font-size:12px">—</span>';
    return `<tr>
      <td>${row.name}</td>
      <td>${stars(row.intuition)}</td>
      <td>${stars(row.abstract)}</td>
      <td>${prereqs}</td>
    </tr>`;
  }).join('');
  tbl.innerHTML = `
    <thead><tr>
      <th>分支</th>
      <th>直覺程度</th>
      <th>抽象程度</th>
      <th>建議先修</th>
    </tr></thead>
    <tbody>${rows}</tbody>`;
}

// ── Interaction ───────────────────────────────────────────────────────

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open');
}

function highlightBranch(id) {
  // Scroll to card and open it
  const card = document.getElementById('card-' + id);
  if (card) {
    card.classList.add('open');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}
